  <g fill="#111111" font-family="Avenir Next, Segoe UI, sans-serif">
    <text x="145" y="155" font-size="56" font-weight="600">Qualitative &amp; contextual</text>
    <text x="145" y="216" font-size="56" font-weight="600">information</text>
    <path d="M145 236H575" stroke="#111111" stroke-width="1.2"/>
    <text x="150" y="292" font-size="48">Atmosphere, usage, sensory elements</text>
    <text x="150" y="344" font-size="48">(light, thermal, etc.)</text>

    <text x="1090" y="155" font-size="56" font-weight="600">Technical information</text>
    <path d="M1078 236H1460" stroke="#111111" stroke-width="1.2"/>
    <text x="1090" y="292" font-size="48">Materials, systems,</text>
    <text x="1090" y="344" font-size="48">performance</text>

    <text x="150" y="830" font-size="56" font-weight="600">Other</text>
    <path d="M145 850H500" stroke="#111111" stroke-width="1.2"/>
    <text x="150" y="906" font-size="46">Constraints, variants, decisions</text>

    <text x="1080" y="830" font-size="56" font-weight="600">In situ measurements</text>
    <path d="M1078 850H1460" stroke="#111111" stroke-width="1.2"/>
    <text x="1080" y="906" font-size="46">Distances, lux, photos, notes</text>
