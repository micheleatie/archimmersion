    <circle cx="1060" cy="290" r="7" fill="#171717"/>

    <circle cx="1088" cy="642" r="7" fill="#171717"/>
    <path d="M1088 642V790" stroke-width="1.6" stroke-dasharray="8 8"/>
    <path d="M1088 790H1128" stroke-width="1.6" stroke-dasharray="8 8"/>
    <circle cx="1088" cy="790" r="7" fill="#171717"/>

    <circle cx="266" cy="470" r="7" fill="#171717"/>
    <path d="M266 470V790" stroke-width="1.6" stroke-dasharray="8 8"/>
    <path d="M266 470H350" stroke-width="1.6" stroke-dasharray="8 8"/>
    <circle cx="266" cy="790" r="7" fill="#171717"/>
